name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build artifacts but skip publishing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Library wheels (Python bindings) ──────────────────────────────────
  build-wheels:
    name: Wheel (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Windows HDF5 static build may fail; don't block release on it.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python versions
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m bindings/python/Cargo.toml --find-interpreter
          before-script-linux: |
            yum install -y cmake3 || yum install -y cmake
            ln -sf /usr/bin/cmake3 /usr/bin/cmake || true

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── Source distribution ───────────────────────────────────────────────
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── GUI wheels (binary distribution) ──────────────────────────────────
  build-gui:
    name: GUI (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python versions
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13

      - name: Build GUI wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: apps/gui
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --find-interpreter
          before-script-linux: |
            yum install -y cmake3 || yum install -y cmake
            ln -sf /usr/bin/cmake3 /usr/bin/cmake || true

      # maturin working-directory puts output in apps/gui/dist
      - name: Upload GUI wheel
        uses: actions/upload-artifact@v4
        with:
          name: gui-wheel-${{ matrix.target }}
          path: apps/gui/dist/*.whl

  # ── macOS app bundle + DMG ────────────────────────────────────────────
  build-macos-app:
    name: macOS App Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cmake and cargo-bundle
        run: |
          brew install cmake
          cargo install cargo-bundle --locked

      - name: Build macOS app bundle
        working-directory: apps/gui
        run: cargo bundle --release

      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          VERSION=${VERSION#v}
          hdiutil create -volname "NEREIDS ${VERSION}" \
            -srcfolder target/release/bundle/osx/NEREIDS.app \
            -ov -format UDZO \
            nereids-${VERSION}-macos-arm64.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: gui-macos-app
          path: "*.dmg"
          if-no-files-found: error

  # ── Publish library to PyPI ───────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    environment:
      name: pypi
      url: https://pypi.org/p/nereids
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist-sdist

      - name: Collect all distributions
        run: |
          mv dist-sdist/*.tar.gz dist/
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: true

  # ── Publish GUI to PyPI ───────────────────────────────────────────────
  publish-gui-pypi:
    name: Publish GUI to PyPI
    needs: [build-gui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    environment:
      name: pypi-gui
      url: https://pypi.org/p/nereids-gui
    steps:
      - name: Download GUI wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gui-wheel-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── Publish Rust crates to crates.io ──────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [build-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    environment:
      name: crates-io
      url: https://crates.io/crates/nereids-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in endf-mat nereids-core nereids-endf nereids-physics \
                        nereids-io nereids-fitting nereids-pipeline; do
            echo "Publishing $crate..."
            if output=$(cargo publish -p "$crate" --no-verify 2>&1); then
              echo "Waiting for crates.io indexing..."
              sleep 60
            else
              echo "$output"
              if echo "$output" | grep -qiE 'already (uploaded|exists)'; then
                echo "$crate already published, skipping"
              else
                echo "Error publishing $crate; failing workflow."
                exit 1
              fi
            fi
          done

  # ── GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-wheels, build-sdist, build-gui, build-macos-app]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/wheels

      - name: Download GUI wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/gui
          pattern: gui-wheel-*
          merge-multiple: true

      - name: Download macOS app DMG
        uses: actions/download-artifact@v4
        with:
          path: dist/dmg
          pattern: gui-macos-app
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp dist/wheels/* release/ 2>/dev/null || true
          cp dist/gui/* release/ 2>/dev/null || true
          cp dist/dmg/* release/ 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  # ── Update Homebrew cask ─────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Cask
    needs: [github-release]
    runs-on: macos-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, 'rc') &&
      !contains(github.ref, 'alpha') &&
      !contains(github.ref, 'beta') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_URL="https://github.com/ornlneutronimaging/NEREIDS/releases/download/v${VERSION}/nereids-${VERSION}-macos-arm64.dmg"
          DOWNLOADED=false
          for i in $(seq 1 30); do
            rm -f nereids.dmg
            if curl -fSL --retry 3 --retry-delay 5 "$DMG_URL" -o nereids.dmg 2>/dev/null; then
              if ! head -c 15 nereids.dmg | LC_ALL=C grep -aE -q '<!DOCTYPE|<html'; then
                echo "DMG downloaded successfully"
                DOWNLOADED=true
                break
              fi
            fi
            echo "Attempt $i: DMG not ready, waiting 10s..."
            sleep 10
          done
          $DOWNLOADED || { echo "Failed to download DMG after 30 attempts"; exit 1; }
          SHA256=$(shasum -a 256 nereids.dmg | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set"
            exit 1
          fi
          git clone https://github.com/ornlneutronimaging/homebrew-nereids.git
          cd homebrew-nereids
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ornlneutronimaging/homebrew-nereids.git"
          [ -f Casks/nereids.rb ] || { echo "::error::Casks/nereids.rb not found in tap repo"; exit 1; }
          # BSD sed syntax — requires macos runner
          sed -i '' "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/nereids.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"${SHA256}\"/" Casks/nereids.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nereids.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update NEREIDS to ${VERSION}"
            git push origin main
          fi
